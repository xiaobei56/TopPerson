name: Skill Proposal / 技能提案
description: Propose a new person skill or request source review before implementation. / 提议一个新人物技能，或先请求来源审查。
title: "[Skill Proposal] "
labels:
  - proposal
body:
  - type: input
    id: person
    attributes:
      label: Person
      description: Who is this skill about? / 这个 skill 对应谁？
      placeholder: Zeng Guofan
    validations:
      required: true

  - type: input
    id: skill_name
    attributes:
      label: Proposed skill name / 建议技能名
      description: Suggested folder / skill name in lowercase hyphen format / 建议使用小写连字符
      placeholder: zeng-guofan
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why should this person become a skill? / 为什么值得做成 skill？
      description: What kind of problems can this skill help solve? / 这个 skill 能帮助解决什么问题？
      placeholder: This person has a distinct way of leading teams, handling crises, or making decisions.
    validations:
      required: true

  - type: textarea
    id: primary_sources
    attributes:
      label: Primary sources / 一手来源
      description: Books, letters, diaries, speeches, interviews, papers, or other first-hand materials / 著作、书信、日记、讲话、访谈、论文等
      placeholder: |
        - 《曾国藩家书》
        - 《曾国藩日记》
    validations:
      required: true

  - type: textarea
    id: secondary_sources
    attributes:
      label: Secondary sources / 二手来源
      description: Biographies, academic papers, or research that help interpret the primary materials / 传记、论文、研究资料等
      placeholder: |
        - 张宏杰《曾国藩的正面与侧面》
        - 年谱、研究论文

  - type: textarea
    id: disputed_points
    attributes:
      label: Low-confidence or disputed materials / 低置信或争议材料
      description: Popular sayings, contested works, or sources that should be handled carefully / 流传语录、存疑著作、需要谨慎处理的材料
      placeholder: |
        - 《冰鉴》
        - 网络流传名言

  - type: textarea
    id: output
    attributes:
      label: Expected output style / 期望输出风格
      description: If the skill is built, how should it answer users? / 如果做出来，希望它怎么回答用户？
      placeholder: Give a diagnosis, first actions, what not to do, and a 7-day / 30-day plan.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 检查项
      options:
        - label: I believe this proposal is based on identifiable sources rather than quote aggregation / 我确认这不是单纯名言拼盘
          required: true
        - label: I understand the repository does not accept harmful, manipulative, or pseudoscientific guidance / 我理解仓库不接受伤害性、操控性或伪科学内容
          required: true
